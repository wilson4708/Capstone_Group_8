<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protected Content</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        
        .login-container h2 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }
        
        .error-message.show {
            display: block;
        }
        
        .protected-content {
            display: none;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 800px;
            width: 100%;
        }
        
        .protected-content.show {
            display: block;
        }
        

        
        .logout-btn {
            margin-top: 30px;
            background: #e74c3c;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="login-container" id="loginForm">
        <h2>🔒 Protected Content</h2>
        <div class="input-group">
            <label for="password">Enter Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button onclick="checkPassword()">Access Content</button>
        <div class="error-message" id="errorMessage">Incorrect password. Please try again.</div>
    </div>

    <!-- Protected Content (Hidden by default) -->
    <div class="protected-content" id="protectedContent">
        <!DOCTYPE html>
        <html lang="en">
            <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>PG Scanner</title>
            <link rel="stylesheet" href="styles.css" />
            <!-- Load TensorFlow.js library for machine learning -->
            <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <!-- Load Teachable Machine Image library for image classification -->
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
        </head>
        <body>
            <h1>PG Scanner</h1>

    <!-- Patient Information Form -->
            <div id="patient-form-container" class="form-container">
            <h3>Patient Information</h3>
            <form id="patient-form" onsubmit="return false;">
                <div class="form-group">
                <label for="patient-name">Patient Name:</label>
                <input type="text" id="patient-name" name="name" required />
                </div>

                <div class="form-group">
                <label for="patient-age">Age:</label>
                <input
                    type="number"
            id="patient-age"
            name="age"
            min="0"
            max="150"
            required
          />
        </div>

        <div class="form-group">
          <label for="patient-sex">Sex:</label>
          <select id="patient-sex" name="sex" required>
            <option value="">Select...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="patient-notes">Notes (Optional):</label>
          <textarea id="patient-notes" name="notes" rows="3"></textarea>
        </div>
      </form>
    </div>

    <h4 id="text">Confidence Levels</h4>
    <!-- Container where the webcam feed will be displayed -->
    <div class="camPlaceHolder" id="webcam-container"></div>
    <!-- Container to display confidence levels of predictions -->
    <div id="label-container"></div>

    <style>
      #PDFbtn {
        display: none; /* Initially Hidden */
      }
      #text {
        display: none;
      }
      #patient-form-container {
        display: block; /* Show form initially */
      }
      #view-records-btn {
        display: inline-block;
      }
    </style>

    <div class="button-container">
      <!-- Button to view patient records -->
      <button id="view-records-btn">View Records</button>
      <!-- Button to trigger PDF export of the current data -->
      <button id="PDFbtn" onclick="exportToPDFWithPatient()">Export PDF</button>
      <!-- Button to trigger camera stream-->
      <button id="StartCamBtn">Start Camera Feed</button>
    </div>

    <!-- Modal for viewing patient records -->
    <div id="records-modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Patient Records</h2>
        <div class="search-container">
          <input
            type="text"
            id="search-input"
            placeholder="Search by name..."
          />
          <button id="search-btn">Search</button>
          <button id="show-all-btn">Show All</button>
        </div>
        <div id="records-list"></div>
      </div>
    </div>

    <!-- Load Patient Database -->
    <script src="PatientDatabase.js"></script>
    <!-- Link to the main script containing the app logic -->
    <script src="TeachableScript.js"></script>
    <!-- Load jsPDF library for exporting content as PDF -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <!-- Script handling PDF export functionality -->
    <script src="PdfExport.js"></script>

    <script>
      // References to buttons and form elements
      const StartCamBtn = document.getElementById("StartCamBtn");
      const PDFbtn = document.getElementById("PDFbtn");
      const textElement = document.getElementById("text");
      const patientForm = document.getElementById("patient-form");
      const patientFormContainer = document.getElementById(
        "patient-form-container"
      );
      const viewRecordsBtn = document.getElementById("view-records-btn");
      const recordsModal = document.getElementById("records-modal");
      const closeModal = document.querySelector(".close");
      const searchInput = document.getElementById("search-input");
      const searchBtn = document.getElementById("search-btn");
      const showAllBtn = document.getElementById("show-all-btn");
      const recordsList = document.getElementById("records-list");

      // Store current patient data
      let currentPatientData = null;

      // Initialize the database
      patientDB
        .init()
        .then(() => {
          console.log("Patient database initialized");
        })
        .catch((err) => {
          console.error("Failed to initialize database:", err);
          alert(
            "Warning: Database initialization failed. Records may not be saved."
          );
        });

      // Helper function to validate form
      function validatePatientForm() {
        const name = document.getElementById("patient-name").value.trim();
        const age = document.getElementById("patient-age").value;
        const sex = document.getElementById("patient-sex").value;

        if (!name) {
          alert("Please enter patient name.");
          return false;
        }
        if (!age || age < 0 || age > 150) {
          alert("Please enter a valid age (0-150).");
          return false;
        }
        if (!sex) {
          alert("Please select patient sex.");
          return false;
        }
        return true;
      }

      // Click event listener to StartCamBtn
      StartCamBtn.addEventListener("click", async () => {
        console.log("Start Camera button clicked");

        // Validate form before starting camera
        if (!validatePatientForm()) {
          return;
        }

        // Store patient data
        currentPatientData = {
          name: document.getElementById("patient-name").value.trim(),
          age: parseInt(document.getElementById("patient-age").value),
          sex: document.getElementById("patient-sex").value,
          notes: document.getElementById("patient-notes").value.trim(),
        };

        console.log("Patient data captured:", currentPatientData);

        StartCamBtn.disabled = true;
        StartCamBtn.textContent = "Loading...";

        try {
          console.log("Calling init() function...");
          await init();
          console.log("Camera initialized successfully");
          StartCamBtn.style.display = "none";
          PDFbtn.style.display = "inline-block";
          textElement.style.display = "inline-block";
          patientFormContainer.style.display = "none"; // Hide form after starting
        } catch (error) {
          console.error("Failed to start camera:", error);
          alert(
            "Failed to start camera. Please check permissions and try again.\n\nError: " +
              error.message
          );
          StartCamBtn.disabled = false;
          StartCamBtn.textContent = "Start Camera Feed";
        }
      });

      // Function to export PDF with patient information
      async function exportToPDFWithPatient() {
        if (!currentPatientData) {
          alert("Patient data not found. Please restart the application.");
          return;
        }

        try {
          // Generate PDF and get filename
          const pdfFilename = await exportToPDF();

          // Add PDF filename to patient data
          currentPatientData.pdfFilename = pdfFilename;

          // Save to database
          const patientId = await patientDB.addPatient(currentPatientData);

          alert(`Patient record saved successfully! Record ID: ${patientId}`);
        } catch (error) {
          console.error("Error saving patient record:", error);
          alert(
            "PDF exported but failed to save patient record.\n\nError: " +
              error.message
          );
        }
      }

      // View Records Modal functionality
      viewRecordsBtn.addEventListener("click", () => {
        recordsModal.style.display = "block";
        loadAllRecords();
      });

      closeModal.addEventListener("click", () => {
        recordsModal.style.display = "none";
      });

      window.addEventListener("click", (event) => {
        if (event.target === recordsModal) {
          recordsModal.style.display = "none";
        }
      });

      // Search functionality
      searchBtn.addEventListener("click", async () => {
        const searchTerm = searchInput.value.trim();
        if (searchTerm) {
          const results = await patientDB.searchPatientsByName(searchTerm);
          displayRecords(results);
        }
      });

      showAllBtn.addEventListener("click", () => {
        loadAllRecords();
      });

      searchInput.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          searchBtn.click();
        }
      });

      // Load all records
      async function loadAllRecords() {
        try {
          const patients = await patientDB.getAllPatients();
          displayRecords(patients);
        } catch (error) {
          console.error("Error loading records:", error);
          recordsList.innerHTML = "<p>Error loading records.</p>";
        }
      }

      // Display records in the modal
      function displayRecords(patients) {
        if (patients.length === 0) {
          recordsList.innerHTML = "<p>No records found.</p>";
          return;
        }

        let html = "<table class='records-table'>";
        html +=
          "<thead><tr><th>ID</th><th>Name</th><th>Age</th><th>Sex</th><th>Date</th><th>PDF</th><th>Actions</th></tr></thead>";
        html += "<tbody>";

        patients.forEach((patient) => {
          const date = new Date(patient.createdAt).toLocaleDateString();
          html += `<tr>
            <td>${patient.id}</td>
            <td>${patient.name}</td>
            <td>${patient.age}</td>
            <td>${patient.sex}</td>
            <td>${time}</td>
            <td>${patient.pdfFilename || "N/A"}</td>
            <td>
              <button onclick="viewPatientDetails(${patient.id})">View</button>
              <button onclick="deletePatientRecord(${
                patient.id
              })">Delete</button>
            </td>
          </tr>`;
        });

        html += "</tbody></table>";
        recordsList.innerHTML = html;
      }

      // View patient details
      async function viewPatientDetails(id) {
        try {
          const patient = await patientDB.getPatientById(id);
          if (patient) {
            alert(
              `Patient Details:\n\nName: ${patient.name}\nAge: ${
                patient.age
              }\nSex: ${patient.sex}\nNotes: ${patient.notes || "None"}\nPDF: ${
                patient.pdfFilename || "N/A"
              }\nCreated: ${new Date(patient.createdAt).toLocaleString()}`
            );
          }
        } catch (error) {
          console.error("Error viewing patient:", error);
        }
      }

      // Delete patient record
      async function deletePatientRecord(id) {
        if (confirm("Are you sure you want to delete this patient record?")) {
          try {
            await patientDB.deletePatient(id);
            alert("Record deleted successfully!");
            loadAllRecords(); // Refresh the list
          } catch (error) {
            console.error("Error deleting patient:", error);
            alert("Failed to delete record.");
          }
        }
      }

      // Make functions available globally
      window.viewPatientDetails = viewPatientDetails;
      window.deletePatientRecord = deletePatientRecord;

      // Debug: Log when page is fully loaded
      window.addEventListener("load", () => {
        console.log("Page fully loaded");
        console.log("init function available:", typeof init !== "undefined");
      });
    </script>
  </body>
</html>
    </div>

    <script>
        // Set your password here
        const correctPassword = "password";
        
        function checkPassword() {
            const enteredPassword = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');
            
            if (enteredPassword === correctPassword) {
                // Password is correct
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('protectedContent').classList.add('show');
                errorMessage.classList.remove('show');
            } else {
                // Password is incorrect
                errorMessage.classList.add('show');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }
        
        function logout() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('protectedContent').classList.remove('show');
            document.getElementById('password').value = '';
        }
        
        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
