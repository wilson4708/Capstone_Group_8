<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PG Scanner</title>
    <link rel="stylesheet" href="Styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  </head>
  <body>
    <h1>PG Scanner</h1>

    <!-- Encryption Setup model -->
    <div id="encryption-model" class="model" style="display: none">
      <div class="model-content">
        <h2>Security Setup Required</h2>
        <p>Set a master password to encrypt patient data:</p>
        <div class="form-group">
          <label for="master-password">Master Password:</label>
          <input type="password" id="master-password" required />
        </div>
        <div class="form-group">
          <label for="confirm-password">Confirm Password:</label>
          <input type="password" id="confirm-password" required />
        </div>
        <button id="setup-encryption-btn" class="encryption-btn">
          Setup Encryption
        </button>
        <p id="encryption-error" style="color: red; display: none"></p>
      </div>
    </div>

    <!-- Patient Information Form -->
    <div id="patient-form-container" class="form-container">
      <h3>Patient Information</h3>
      <form id="patient-form" onsubmit="return false;">
        <div class="form-group">
          <label for="patient-name">Patient Name:</label>
          <input type="text" id="patient-name" name="name" required />
        </div>
        <div class="form-group">
          <label for="patient-age">Age:</label>
          <input
            type="number"
            id="patient-age"
            name="age"
            min="0"
            max="150"
            required
          />
        </div>
        <div class="form-group">
          <label for="patient-sex">Sex:</label>
          <select id="patient-sex" name="sex" required>
            <option value="">Select...</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="patient-notes">Notes (Optional):</label>
          <textarea id="patient-notes" name="notes" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="patient-image">Upload Image (Optional):</label>
          <input type="file" id="patient-image" name="image" accept="image/*" />
          <div id="image-preview-container" style="display: none">
            <img id="image-preview" alt="Image preview" />
            <button type="button" id="remove-image-btn">Remove Image</button>
          </div>
        </div>
      </form>
    </div>

    <h4 id="text">Scan Results</h4>

    <!-- Scanner layout: camera left, sidebar right -->
    <div class="scanner-layout">
      <div class="camPlaceHolder" id="webcam-container"></div>

      <div class="scanner-sidebar">
        <div id="label-container"></div>
        <div id="lighting-container"></div>
        <div class="button-container">
          <button id="view-records-btn">View Records</button>
          <button id="back-btn">Add Another Patient</button>
          <button id="PDFbtn" onclick="exportToPDFWithPatient()">
            Export PDF
          </button>
          <button id="StartCamBtn">Start Scan</button>
          <button id="TakePhotoBtn" style="display:none">Scan</button>
          <button id="FlipCamBtn" style="display:none">Flip Camera</button>
        </div>
      </div>
    </div>

    <!-- Modal for viewing patient records -->
    <div id="records-model" class="model">
      <div class="model-content">
        <span class="close">&times;</span>
        <h2>Patient Records</h2>
        <div class="search-container">
          <input
            type="text"
            id="search-input"
            placeholder="Search by name..."
          />
          <button id="search-btn">Search</button>
          <button id="show-all-btn">Show All</button>
        </div>
        <div id="records-list"></div>
      </div>
    </div>

    <!-- Load scripts in correct order - VERY IMPORTANT -->
    <script src="Encryption.js"></script>
    <script src="PatientDatabase.js"></script>
    <script src="TeachableScript.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="PdfExport.js"></script>
    <script src="App.js"></script>
  </body>
</html>
