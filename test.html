<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PG Scanner</title>
    <link rel="stylesheet" href="styles.css"/>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>

<body>
    <!-- Title at top -->
    <h1>PG Scanner</h1>
    
    <!-- Camera feed area -->
    <div class="camPlaceHolder" id="webcam-container"></div>

    <!-- ✅ Place the button RIGHT BELOW the camera feed -->
    <button id="exportBtn" class="export">Export to PDF</button>

    <!-- Confidence Levels section -->
    <h4>Confidence Levels</h4>
    <div id="label-container"></div>

    <!-- Load the camera when the page loads -->
    <script>
        window.addEventListener('DOMContentLoaded', () => {
            init();
        });
    </script>

    <!-- Your model script -->
    <script src="script.js"></script>

    <!-- jsPDF for PDF export -->
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

    <!-- PDF export logic -->
    <script>
        (function () {
            const pad = (n) => String(n).padStart(2, '0');
            const timestamp = () => {
                const d = new Date();
                return `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            };

            async function getSnapshotDataURL() {
                let canvas = document.querySelector('#webcam-container canvas');
                const video = document.querySelector('#webcam-container video');
                if (canvas) {
                    try { return canvas.toDataURL('image/jpeg', 0.92); } catch (e) {}
                }
                if (video && video.videoWidth && video.videoHeight) {
                    const temp = document.createElement('canvas');
                    temp.width = video.videoWidth; temp.height = video.videoHeight;
                    temp.getContext('2d').drawImage(video, 0, 0, temp.width, temp.height);
                    return temp.toDataURL('image/jpeg', 0.92);
                }
                return null;
            }

            function getConfidenceText() {
                const c = document.getElementById('label-container');
                if (!c) return 'No confidence values available.';
                const lines = Array.from(c.children)
                    .map(el => (el.innerText || el.textContent || '').trim())
                    .filter(Boolean);
                if (lines.length) return lines.join('\n');
                const t = (c.innerText || c.textContent || '').trim();
                return t || 'No confidence values available.';
            }

            async function exportToPDF() {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
                const pageW = pdf.internal.pageSize.getWidth();
                const pageH = pdf.internal.pageSize.getHeight();
                const margin = 36;
                let y = margin;

                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(18);
                pdf.text('PG Scanner Report', margin, y); y += 22;

                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(11);
                pdf.text(`Generated: ${new Date().toLocaleString()}`, margin, y); y += 16;

                const imgData = await getSnapshotDataURL();
                if (imgData) {
                    const img = new Image(); img.src = imgData; await new Promise(r => img.onload = r);
                    const maxW = pageW - margin*2; const scale = maxW / img.width;
                    const drawW = maxW; const drawH = img.height * scale;
                    pdf.addImage(imgData, 'JPEG', margin, y, drawW, drawH); y += drawH + 18;
                } else {
                    pdf.setTextColor(200,0,0); pdf.text('Snapshot unavailable (camera not ready).', margin, y);
                    pdf.setTextColor(0,0,0); y += 18;
                }

                pdf.setFont('helvetica', 'bold'); pdf.setFontSize(14);
                pdf.text('Confidence Levels', margin, y); y += 16;

                pdf.setFont('helvetica', 'normal'); pdf.setFontSize(12);
                const wrapped = pdf.splitTextToSize(getConfidenceText(), pageW - margin*2);
                if (y + wrapped.length * 14 > pageH - margin) { pdf.addPage(); y = margin; }
                pdf.text(wrapped, margin, y);

                pdf.save(`PG-Scan_${timestamp()}.pdf`);
            }

            window.addEventListener('DOMContentLoaded', () => {
                document.getElementById('exportBtn').addEventListener('click', exportToPDF);
            });
        })();
    </script>
</body>
</html>
